{{ with resources.Get "js/custom-bg.js" }}
  {{ $alg := site.Params.fingerprintAlgorithm | default "sha512" }}
  {{ $customBg := . | resources.Minify | resources.Fingerprint $alg }}
  <script
    defer
    type="text/javascript"
    src="{{ $customBg.RelPermalink }}"
    integrity="{{ $customBg.Data.Integrity }}"></script>
{{ end }}

{{ if eq .Site.Language.Lang "zh-cn" }}
  <script>
    (function () {
      var targetSiteTitle = "Ta1ntF10w的博客";
      var title = document.title || "";
      if (title.indexOf("·") !== -1) {
        document.title = title.replace(/·\s*.*/, "· " + targetSiteTitle);
      } else {
        document.title = targetSiteTitle;
      }
    })();
  </script>
{{ end }}
