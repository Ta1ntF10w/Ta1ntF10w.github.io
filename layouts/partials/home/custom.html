<div class="falling-lines-bg">
  <div class="line-container">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>
</div>

<script>
  // 追踪鼠标位置并转换为 CSS 变量，用于视差互动
  document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 20; // 偏移量 -10 到 10
    const y = (e.clientY / window.innerHeight - 0.5) * 20;
    document.documentElement.style.setProperty('--move-x', x + 'px');
    document.documentElement.style.setProperty('--move-y', y + 'px');
  });
</script>
